# Short evaluation queries for WTF retrieval benchmarking
# set: "dev" = used during development/tuning, "test" = held-out for final validation
queries:
  # === Git ===
  - query: "undo last git commit keep changes"
    slice: "git-undo"
    set: "dev"
    relevant: ["git reset", "git revert"]

  - query: "revert a pushed commit safely"
    slice: "git-undo"
    set: "dev"
    relevant: ["git revert"]

  - query: "unstage a file from git"
    slice: "git-undo"
    set: "test"
    relevant: ["git reset", "git restore"]

  - query: "delete merged local branches"
    slice: "git-branch"
    set: "dev"
    relevant: ["git branch"]

  - query: "create a new git branch"
    slice: "git-branch"
    set: "dev"
    relevant: ["git branch", "git checkout", "git switch"]

  - query: "switch to another branch"
    slice: "git-branch"
    set: "test"
    relevant: ["git checkout", "git switch"]

  - query: "show git commit history"
    slice: "git-log"
    set: "dev"
    relevant: ["git log"]

  - query: "show changes in last commit"
    slice: "git-diff"
    set: "dev"
    relevant: ["git diff", "git show"]

  - query: "compare two branches"
    slice: "git-diff"
    set: "test"
    relevant: ["git diff"]

  - query: "stash uncommitted changes"
    slice: "git-stash"
    set: "dev"
    relevant: ["git stash"]

  - query: "apply stashed changes"
