# Long/conversational evaluation queries for WTF retrieval benchmarking
# set: "dev" = used during development/tuning, "test" = held-out for final validation
queries:
  # === Recursive Text Search ===
  - query: "how can i recursively search every text file in this project for error or timeout and print matching lines"
    slice: "recursive-text-search"
    set: "dev"
    relevant: ["grep", "ripgrep", "find"]

  - query: "find every json file and then search for the word timeout inside them"
    slice: "recursive-text-search"
    set: "dev"
    relevant: ["find", "grep", "ripgrep"]

  - query: "what command can search recursively but ignore binary files and show line numbers"
    slice: "recursive-text-search"
    set: "dev"
    relevant: ["grep", "ripgrep"]

  - query: "i want to search through all python files in this project for any import statement that mentions requests"
    slice: "recursive-text-search"
    set: "test"
    relevant: ["grep", "ripgrep", "find"]

  # === Text Replace ===
  - query: "i need to replace a string recursively across all files in this directory and keep backups"
    slice: "recursive-text-replace"
    set: "dev"
    relevant: ["sed", "perl", "awk"]

  - query: "how can i replace every occurrence of localhost with my server ip in all config files"
    slice: "recursive-text-replace"
    set: "dev"
    relevant: ["sed", "perl"]

  # === Download ===
  - query: "show me how to download a file from a url and save it with a custom name in current directory"
    slice: "download"
    set: "dev"
    relevant: ["wget", "curl"]

  - query: "download a file over https and save it to a specific output filename"
    slice: "download"
    set: "dev"
    relevant: ["wget", "curl"]

  - query: "i want to resume a partially downloaded file from the same url"
    slice: "download"
    set: "dev"
    relevant: ["wget", "curl"]

  - query: "what tool can mirror an entire website for offline browsing"
    slice: "download"
    set: "test"
    relevant: ["wget", "curl"]

  # === Git ===
  - query: "what is the safest way to undo the last git commit but keep my file changes"
    slice: "git-undo"
    set: "dev"
    relevant: ["git reset", "git revert"]

  - query: "how do i undo a commit that has already been pushed to remote without rewriting history"
    slice: "git-undo"
    set: "dev"
    relevant: ["git revert"]

  - query: "what command should i use to remove merged branches but keep main and develop"
    slice: "git-branch"
    set: "dev"
    relevant: ["git branch"]

  - query: "i need to save my current work temporarily and switch to another branch without committing"
    slice: "git-stash"
    set: "dev"
    relevant: ["git stash"]

  - query: "how do i see the difference between my current code and the last commit"
    slice: "git-diff"
    set: "dev"
    relevant: ["git diff"]

  - query: "show me how to clone a repo and only get the latest commit without full history"
    slice: "git-clone"
    set: "dev"
    relevant: ["git clone"]

  - query: "what is the command to squash the last three commits into one before pushing"
    slice: "git-merge"
    set: "test"
    relevant: ["git rebase"]

  - query: "how can i see which files were changed in a specific commit"
    slice: "git-log"
    set: "dev"
    relevant: ["git show", "git log", "git diff"]

  # === Archive ===
  - query: "how can i compress this folder into a tar gz archive with maximum compatibility"
    slice: "archive"
    set: "dev"
    relevant: ["tar", "gzip"]

  - query: "i need to extract a tar gz archive into a target directory preserving permissions"
    slice: "archive"
    set: "dev"
    relevant: ["tar", "gunzip"]

  - query: "please suggest a command to unzip an archive into the current working folder"
    slice: "archive"
    set: "dev"
    relevant: ["unzip"]

  - query: "how do i create a password protected zip archive from the command line"
    slice: "archive"
    set: "test"
    relevant: ["zip", "7z"]

  # === File Copy ===
  - query: "please show me a command to copy a big file while showing progress"
    slice: "file-copy-progress"
    set: "dev"
    relevant: ["cp", "rsync"]

  - query: "copy a directory tree to another disk and display progress and speed"
    slice: "file-copy-progress"
    set: "dev"
    relevant: ["rsync", "cp"]

  # === Disk ===
  - query: "how do i check disk usage for each folder under the current directory sorted by size"
    slice: "disk"
    set: "dev"
    relevant: ["du", "df"]

  - query: "show free and used filesystem space in human readable units"
    slice: "disk"
    set: "dev"
    relevant: ["df"]

  # === Process / Port ===
  - query: "which command finds the process listening on port 8080 on windows"
    slice: "process-on-port"
    set: "dev"
    relevant: ["netstat", "ss", "lsof"]

  - query: "on linux i need to find the pid that owns a tcp listening socket on a given port"
    slice: "process-on-port"
    set: "dev"
    relevant: ["lsof", "ss", "netstat"]

  - query: "what can i use to list all running processes and then terminate one by pid"
    slice: "process-management"
