  - query: "what is the command to recursively delete a directory and everything inside it"
    slice: "filesystem-basic"
    set: "dev"
    relevant: ["rm"]

  - query: "how do i create a symbolic link that points to another file or directory"
    slice: "symlink"
    set: "dev"
    relevant: ["ln"]

  # === Package Management ===
  - query: "install a python package in the current environment with pip"
    slice: "package"
    set: "dev"
    relevant: ["pip install"]

  - query: "install a package on ubuntu from apt repositories"
    slice: "package"
    set: "dev"
    relevant: ["apt"]

  - query: "what command do i use to update all installed packages on my linux system"
    slice: "package"
    set: "test"
